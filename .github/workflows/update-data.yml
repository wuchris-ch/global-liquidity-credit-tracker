name: Update data and publish to GitHub Pages

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  workflow_dispatch: {}

concurrency:
  group: update-data-publish
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      DATA_PATH: ${{ github.workspace }}/data
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # needed to manage gh-pages branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.4"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restore published GLCI snapshot ledger
        run: |
          mkdir -p data/curated/indices
          if git cat-file -e origin/gh-pages:state/glci_vintages.parquet 2>/dev/null; then
            git show origin/gh-pages:state/glci_vintages.parquet > data/curated/indices/glci_vintages.parquet
            if git cat-file -e origin/gh-pages:latest/api/glci/trust/index.json 2>/dev/null; then
              git show origin/gh-pages:latest/api/glci/trust/index.json > /tmp/prior_glci_trust.json
              python - <<'PY'
              import json
              import pandas as pd

              ledger = pd.read_parquet("data/curated/indices/glci_vintages.parquet")
              with open("/tmp/prior_glci_trust.json") as handle:
                  prior_count = int(json.load(handle)["snapshots"]["count"])
              if len(ledger) < prior_count:
                  raise SystemExit(
                      f"Snapshot ledger regressed from {prior_count} to {len(ledger)} rows"
                  )
              PY
            fi
            echo "Restored prior GLCI publication snapshots"
          elif git cat-file -e origin/gh-pages:state/glci_vintages.required 2>/dev/null || \
               git cat-file -e origin/gh-pages:latest/api/glci/trust/index.json 2>/dev/null; then
            echo "ERROR: The published GLCI snapshot ledger is missing. Refusing to reset its history."
            exit 1
          else
            echo "No snapshot-ledger marker found; bootstrapping the first ledger"
          fi

      - name: Run calculation tests (publish gate)
        run: python -m pytest tests/

      - name: Update data (fetch + indices)
        run: python scripts/update_data.py

      - name: Compute risk metrics and save
        run: |
          python - <<'PY'
          from src.indicators.risk_metrics import compute_risk_metrics
          compute_risk_metrics(save=True)
          PY

      - name: Compute backtest track record and save
        run: |
          python - <<'PY'
          from src.indicators.backtest import compute_backtest
          compute_backtest(save=True)
          PY

      - name: Compute liquidity flows and save
        run: |
          python - <<'PY'
          from src.indicators.flows import compute_flows
          compute_flows(save=True)
          PY

      - name: Export JSON artifacts
        run: |
          python scripts/export_to_json.py --output data/export/latest --snapshot --require-production

      - name: Smoke-check artifacts before publishing
        run: python scripts/smoke.py

      - name: Copy artifacts aside
        run: |
          mkdir -p /tmp/export
          rm -rf /tmp/export/*
          cp -r data/export/* /tmp/export/
          mkdir -p /tmp/state
          rm -rf /tmp/state/*
          if [ ! -s data/curated/indices/glci_vintages.parquet ]; then
            echo "ERROR: GLCI snapshot ledger was not produced"
            exit 1
          fi
          cp data/curated/indices/glci_vintages.parquet /tmp/state/
          touch /tmp/state/glci_vintages.required
          cp vercel.json /tmp/export/

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git remote set-url origin "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          # Clean working tree except .git
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          # Restore artifacts
          mkdir -p latest
          cp -r /tmp/export/latest/* latest/
          if [ -d /tmp/export/snapshots ]; then
            cp -r /tmp/export/snapshots snapshots
            # keep only the 3 most recent snapshots to limit repo size
            SNAP_DIRS=$(find snapshots -maxdepth 1 -mindepth 1 -type d | sort)
            COUNT=$(echo "$SNAP_DIRS" | wc -l | tr -d ' ')
            if [ "$COUNT" -gt 3 ]; then
              echo "$SNAP_DIRS" | head -n $(($COUNT-3)) | xargs -r rm -rf
            fi
          fi

          mkdir -p state
          cp /tmp/state/glci_vintages.parquet state/
          cp /tmp/state/glci_vintages.required state/
          
          # Restore vercel.json to disable Vercel builds for this branch
          cp /tmp/export/vercel.json .

          touch .nojekyll

          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin gh-pages
          fi
